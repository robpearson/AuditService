apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: audit-service-dev
  namespace: argocd
  annotations:
    argo.octopus.com/project: "audit-service"
    argo.octopus.com/environment: "development"
    argo.octopus.com/image-replace-paths: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
spec:
  project: default
  source:
    repoURL: https://github.com/robpearson/AuditService
    targetRevision: HEAD
    path: audit-service
    helm:
      releaseName: audit-service
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: audit-service-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
