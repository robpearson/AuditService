apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: audit-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/robpearson/AuditService
    targetRevision: HEAD
    path: audit-service
    helm:
      releaseName: audit-service
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: audit-service-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
