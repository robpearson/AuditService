image:
  repository: ghcr.io/robpearson/auditservice
  pullPolicy: Always
  tag: "2025.6.1.709"

service:
  type: ClusterIP
  port: 80

replicaCount: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  matches: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
